version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: inskies_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inskies
    ports:
      - "5432:5432"
    volumes:
      - inskies_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inskies_redis
    ports:
      - "6379:6379"
    volumes:
      - inskies_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  inskies_postgres_data:
  inskies_redis_data:
